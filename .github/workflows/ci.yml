name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          # setup-python keys the pip cache off requirements.txt by default;
          # we use pyproject.toml, so point it there (otherwise the cache step
          # errors and fails the whole job).
          cache-dependency-path: pyproject.toml

      # TensorFlow (the [lstm] extra) is intentionally not installed: the test
      # suite covers the LightGBM + serving paths and does not need it, which
      # keeps CI fast. libgomp (LightGBM's OpenMP runtime) is present on the
      # ubuntu-latest runner by default.
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,serve]"

      - name: Lint (ruff)
        run: ruff check src tests scripts

      - name: Test (pytest)
        run: pytest
